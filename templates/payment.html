<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIAMAT Payment Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TIAMAT001"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-TIAMAT001', {'anonymize_ip': false});
        
        // Track page view
        gtag('event', 'page_view', {
            'page_title': 'Payment Gateway',
            'page_path': '/pay',
            'page_location': window.location.href
        });
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'JetBrains Mono', monospace;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-container {
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        h1 { font-size: 28px; margin-bottom: 20px; text-align: center; }
        .payment-method {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #00ff88;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .payment-method:hover { background: rgba(0, 255, 136, 0.1); }
        .payment-method input { margin-right: 10px; cursor: pointer; }
        .payment-method label { cursor: pointer; }
        button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); }
        button:active { transform: scale(0.98); }
        .qr-code { text-align: center; margin: 30px 0; }
        .qr-code img { max-width: 200px; border: 2px solid #00ff88; padding: 10px; background: white; }
        .hidden { display: none; }
        .warning { color: #ffaa00; font-size: 14px; margin: 10px 0; }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .info-box {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .pricing-card {
            border: 1px solid #00ff88;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pricing-card.selected { background: rgba(0, 255, 136, 0.2); }
        .pricing-card:hover { background: rgba(0, 255, 136, 0.1); }
        .price { font-size: 20px; font-weight: bold; }
        .calls { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h1>💰 TIAMAT Payment Gateway</h1>
        
        <div class="info-box">
            Pay once. Access for 30 days. Use the API with your generated API key.
        </div>

        <div class="pricing-grid">
            <div class="pricing-card" data-amount="1" data-calls="1000">
                <div class="price">$1 USD</div>
                <div class="calls">1,000 API Calls</div>
            </div>
            <div class="pricing-card selected" data-amount="5" data-calls="5000">
                <div class="price">$5 USD</div>
                <div class="calls">5,000 API Calls</div>
            </div>
            <div class="pricing-card" data-amount="10" data-calls="10000">
                <div class="price">$10 USD</div>
                <div class="calls">10,000 API Calls</div>
            </div>
            <div class="pricing-card" data-amount="50" data-calls="50000">
                <div class="price">$50 USD</div>
                <div class="calls">50,000 API Calls</div>
            </div>
        </div>

        <fieldset>
            <legend>Choose Payment Method:</legend>
            
            <div class="payment-method">
                <input type="radio" id="crypto" name="payment" value="crypto" checked>
                <label for="crypto">
                    <strong>Base Network (USDC)</strong> - Instant, trustless, transparent
                </label>
                <div class="qr-code hidden" id="qr-container">
                    <p style="margin-bottom: 10px; font-size: 12px;">Send USDC to:</p>
                    <p style="word-break: break-all; font-size: 12px; margin-bottom: 10px;" id="wallet-address">0xdc118c4e1284e61e4d5277936a64B9E08Ad9e7EE</p>
                </div>
            </div>

            <div class="payment-method">
                <input type="radio" id="stripe" name="payment" value="stripe">
                <label for="stripe">
                    <strong>Credit Card (Stripe)</strong> - Traditional payment
                </label>
            </div>
        </fieldset>

        <button id="pay-button" onclick="handlePayment()">Proceed to Payment</button>

        <div id="status-message" class="hidden"></div>
    </div>

    <script>
        const pricingCards = document.querySelectorAll('.pricing-card');
        let selectedAmount = 5; // Default
        let selectedCalls = 5000;

        pricingCards.forEach(card => {
            card.addEventListener('click', () => {
                const previousAmount = selectedAmount;
                pricingCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedAmount = card.dataset.amount;
                selectedCalls = card.dataset.calls;
                
                // Track pricing tier selection
                gtag('event', 'select_pricing_tier', {
                    'previous_tier': previousAmount + ' USD',
                    'tier': selectedAmount + ' USD',
                    'calls': selectedCalls
                });
            });
        });

        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const qrContainer = document.getElementById('qr-container');
                const method = e.target.value;
                
                // Track payment method selection
                gtag('event', 'select_payment_method', {
                    'payment_method': method,
                    'currency': 'USD'
                });
                
                if (method === 'crypto') {
                    qrContainer.classList.remove('hidden');
                } else {
                    qrContainer.classList.add('hidden');
                }
            });
        });

        function handlePayment() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            const statusDiv = document.getElementById('status-message');

            // Track payment button click
            gtag('event', 'payment_attempt', {
                'payment_method': method,
                'amount': selectedAmount,
                'currency': 'USD',
                'calls': selectedCalls,
                'timestamp': new Date().toISOString()
            });

            if (method === 'crypto') {
                statusDiv.innerHTML = `<p class="warning">Awaiting payment verification...</p>`;
                statusDiv.classList.remove('hidden');
                
                // Simulate listening for blockchain event
                setTimeout(() => {
                    gtag('event', 'payment_verification_pending', {
                        'amount': selectedAmount,
                        'currency': 'USD'
                    });
                }, 1000);
            } else if (method === 'stripe') {
                statusDiv.innerHTML = `<p class="warning">Stripe integration coming soon</p>`;
                statusDiv.classList.remove('hidden');
                
                gtag('event', 'payment_method_unavailable', {
                    'method': 'stripe'
                });
            }
        }
    </script>
</body>
</html>
