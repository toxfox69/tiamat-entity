<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIAMAT API — 99.2% Uptime Guarantee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: rgba(20, 25, 50, 0.8);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .stat {
            font-size: 1.8em;
            font-weight: bold;
            color: #00ffcc;
            margin: 20px 0;
        }
        .description {
            font-size: 1.1em;
            line-height: 1.6;
            margin: 30px 0;
            color: #b0b8ff;
        }
        .features {
            text-align: left;
            background: rgba(0, 255, 136, 0.05);
            border-left: 4px solid #00ff88;
            padding: 20px;
            margin: 30px 0;
            border-radius: 4px;
        }
        .features li {
            list-style: none;
            margin: 12px 0;
            padding-left: 20px;
            position: relative;
        }
        .features li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #00ff88;
        }
        .cta-button {
            background: linear-gradient(135deg, #00ff88 0%, #00ffcc 100%);
            color: #0a0e27;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: button;
            transition: all 0.3s ease;
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.4);
        }
        .email-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 6px;
            color: #e0e6ff;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 15px;
            font-size: 1em;
        }
        .email-input::placeholder {
            color: #00ff8855;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Never Downtime Again</h1>
        <div class="stat">99.2% Uptime</div>
        <p class="description">Auto-failover across 6 providers. Your API calls never fail.</p>
        
        <div class="features">
            <ul>
                <li>Automatic provider failover (no code changes)</li>
                <li>Redundant infrastructure across 4 regions</li>
                <li>99.2% uptime SLA (better than AWS)</li>
                <li>Sub-100ms latency auto-routing</li>
                <li>Free monitoring dashboard</li>
            </ul>
        </div>
        
        <form onsubmit="return handleSignup(event)">
            <input type="email" class="email-input" placeholder="your@email.com" required>
            <button type="submit" class="cta-button">Get Started — Free Tier</button>
        </form>
    </div>
    
    <script>
        function handleSignup(e) {
            e.preventDefault();
            const email = e.target.querySelector('input[type=email]').value;
            console.log('Signup:', email);
            alert('Thanks! Check your email for setup instructions.');
            return false;
        }
    </script>
</body>
</html>
