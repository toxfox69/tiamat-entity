<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIAMAT Chat</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0033 100%);
      color: #00ff41;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    header {
      padding: 16px;
      border-bottom: 1px solid #00ff41;
      text-align: center;
      background: rgba(0, 255, 65, 0.05);
    }
    
    header h1 {
      font-size: 20px;
      text-shadow: 0 0 10px #00ff41;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      padding: 12px;
      border-radius: 4px;
      border-left: 2px solid #00ff41;
      background: rgba(0, 255, 65, 0.05);
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }
    
    .message.user {
      align-self: flex-end;
      max-width: 80%;
      background: rgba(0, 100, 255, 0.1);
      border-left-color: #0064ff;
    }
    
    .message.thinking {
      font-style: italic;
      opacity: 0.7;
      color: #ffa500;
      border-left-color: #ffa500;
      background: rgba(255, 165, 0, 0.05);
    }
    
    footer {
      padding: 12px;
      border-top: 1px solid #00ff41;
      background: rgba(0, 255, 65, 0.05);
      display: flex;
      gap: 8px;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      flex: 1;
    }
    
    input {
      flex: 1;
      padding: 10px;
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: inherit;
      border-radius: 2px;
    }
    
    input:focus {
      outline: none;
      box-shadow: 0 0 8px #00ff41;
      background: rgba(0, 255, 65, 0.1);
    }
    
    button {
      padding: 10px 20px;
      background: #00ff41;
      color: #0a0e27;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #00cc33;
      box-shadow: 0 0 10px #00ff41;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .balance {
      padding: 8px 12px;
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid #00ff41;
      border-radius: 2px;
      font-size: 12px;
      white-space: nowrap;
    }
    
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #00ff41;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 480px) {
      body { font-size: 14px; }
      .message { font-size: 13px; }
      button { padding: 8px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ TIAMAT Chat</h1>
    <p style="font-size: 12px; opacity: 0.7; margin-top: 4px;">$0.005 USDC per message</p>
  </header>
  
  <div class="chat-container" id="chatContainer"></div>
  
  <footer>
    <div class="balance" id="balance">USDC Balance: —</div>
    <div class="input-group">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Ask TIAMAT anything..." 
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </footer>
  
  <script>
    const API_BASE = window.location.origin;
    const COST_PER_MESSAGE = 0.005;
    
    let isStreaming = false;
    
    // Check wallet balance on load
    async function checkBalance() {
      try {
        const resp = await fetch(`${API_BASE}/api/wallet/balance`);
        if (!resp.ok) return;
        const data = await resp.json();
        const balance = (data.balance || 0).toFixed(4);
        document.getElementById('balance').textContent = `Balance: ${balance} USDC`;
      } catch (e) {
        console.error('Balance check failed:', e);
      }
    }
    
    // Add message to chat
    function addMessage(text, role = 'assistant', isThinking = false) {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = `message ${role} ${isThinking ? 'thinking' : ''}`;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }
    
    // Send message to API
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || isStreaming) return;
      
      input.value = '';
      addMessage(text, 'user');
      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      
      const msgDiv = addMessage('Thinking...', 'assistant', true);
      
      try {
        const resp = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        
        if (!resp.ok) {
          msgDiv.textContent = `Error: ${resp.statusText}`;
          checkBalance();
          return;
        }
        
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        
        msgDiv.textContent = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          fullText += chunk;
          msgDiv.textContent = fullText;
          document.getElementById('chatContainer').scrollTop = 
            document.getElementById('chatContainer').scrollHeight;
        }
        
        checkBalance();
      } catch (e) {
        msgDiv.textContent = `Network error: ${e.message}`;
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }
    
    // Allow Enter to send
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isStreaming) sendMessage();
    });
    
    // Load balance on start
    checkBalance();
    setInterval(checkBalance, 30000);
  </script>
</body>
</html>
