name: Build Daily Motivationals APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/daily-motivationals/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Install dependencies
        working-directory: apps/daily-motivationals
        run: flutter pub get

      - name: Build APK
        working-directory: apps/daily-motivationals
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-motivationals-release
          path: apps/daily-motivationals/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
